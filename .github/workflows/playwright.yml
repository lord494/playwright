name: Run Changed Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  run-playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/playwright-tests:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/playwright-tests:latest

      - name: Detect changed folders and map to test dirs
        run: |
          echo "Detecting changes..."

          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          echo "Changed files:"
          echo "$CHANGED_FILES"

          TEST_DIRS_SET=()

          for file in $CHANGED_FILES; do
            if [[ "$file" == page/*/* ]]; then
              feature=$(echo "$file" | cut -d/ -f2)
              test_path="tests/$feature"
              if [ -d "$test_path" ]; then
                TEST_DIRS_SET+=("$test_path")
              fi
            fi

            if [[ "$file" == tests/*/* ]]; then
              feature=$(echo "$file" | cut -d/ -f2)
              test_path="tests/$feature"
              if [ -d "$test_path" ]; then
                TEST_DIRS_SET+=("$test_path")
              fi
            fi
          done

          UNIQUE_TEST_DIRS=$(printf "%s\n" "${TEST_DIRS_SET[@]}" | sort -u | tr '\n' ' ')
          echo "TEST_DIRS=$UNIQUE_TEST_DIRS" >> $GITHUB_ENV
          echo "Will run tests in: $UNIQUE_TEST_DIRS"

      - name: Run matched Playwright tests in Docker
        if: env.TEST_DIRS != ''
        run: |
          echo "Running Playwright tests for changed areas: $TEST_DIRS"

          mkdir -p playwright-report
          mkdir -p test-results

          set +e

          docker run --rm \
            -e CI=true \
            -e PLAYWRIGHT_HTML_OPEN=never \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            ${{ secrets.DOCKER_USERNAME }}/playwright-tests:latest \
            sh -c "cd /app && npx playwright test $TEST_DIRS --trace=retain-on-failure --reporter=line,html" \
            2>&1 | tee playwright-output.log

          TEST_EXIT_CODE=${PIPESTATUS[0]}

          echo "$TEST_EXIT_CODE" > playwright-exit-code.txt

          echo "Playwright exit code: $TEST_EXIT_CODE"
          echo "Saved Playwright output:"
          cat playwright-output.log

          echo "Checking generated folders:"
          ls -la
          ls -la playwright-report || true
          ls -la test-results || true

          exit 0

      - name: Ask Claude to analyze failed Playwright tests
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Claude step started."

          if [ ! -f playwright-exit-code.txt ]; then
            echo "No playwright-exit-code.txt found. Probably no tests were executed."
            exit 0
          fi

          TEST_EXIT_CODE=$(cat playwright-exit-code.txt)
          echo "Detected Playwright exit code: $TEST_EXIT_CODE"

          if [ "$TEST_EXIT_CODE" = "0" ]; then
            echo "Playwright tests passed. Claude analysis is not needed."
            exit 0
          fi

          echo "# Claude Analysis" > claude-analysis.md

          if [ ! -f playwright-output.log ]; then
            echo "playwright-output.log was not found." >> claude-analysis.md
            exit 0
          fi

          TEST_OUTPUT=$(cat playwright-output.log)

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            --header "x-api-key: $ANTHROPIC_API_KEY" \
            --header "anthropic-version: 2023-06-01" \
            --header "content-type: application/json" \
            --data "$(jq -n --arg output "$TEST_OUTPUT" '{
              model: "claude-sonnet-4-5",
              max_tokens: 1500,
              messages: [
                {
                  role: "user",
                  content: "Analyze this failed Playwright test outpu